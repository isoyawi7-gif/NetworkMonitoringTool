<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vodafone PNG - NOC & Power Monitoring</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial,sans-serif;
margin:20px;
background:#f4f6f9;
}

h1{
text-align:center;
color:#c00000;
}

.container{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:20px;
}

input,select{
padding:8px;
margin:5px;
width:180px;
}

button{
padding:10px 15px;
background:#c00000;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#900;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table th, table td{
border:1px solid #ccc;
padding:8px;
text-align:left;
}

canvas{
max-width:600px;
margin:auto;
display:block;
}
</style>
</head>

<body>

<h1>Vodafone PNG - Iso Yawi private monitoring /h1>

<div class="container">
<h2>Add Outage Record</h2>

<input type="date" id="date">

<input type="text" id="site" placeholder="Site Name">

<select id="type">
<option>Network</option>
<option>Power</option>
<option>Transmission</option>
</select>

<select id="cause">
<option>Commercial Power Failure</option>
<option>Generator Failure</option>
<option>Battery Failure</option>
<option>Fiber Cut</option>
<option>Microwave Failure</option>
<option>Equipment Failure</option>
<option>Lightning</option>
<option>Other</option>
</select>

<input type="number" id="duration" placeholder="Duration (hrs)">

<button onclick="addRecord()">Add Record</button>
<button onclick="exportCSV()">Export Excel CSV</button>

</div>

<div class="container">
<h2>Outage Records</h2>

<table id="recordsTable">
<thead>
<tr>
<th>Date</th>
<th>Site</th>
<th>Type</th>
<th>Cause</th>
<th>Duration</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<div class="container">
<h2>Outage Cause Analysis</h2>
<canvas id="pieChart"></canvas>
</div>

<div class="container">
<h2>Weekly Outages</h2>
<canvas id="barChart"></canvas>
</div>

<script>

let records = JSON.parse(localStorage.getItem("nocRecords")) || [];

function saveData(){
localStorage.setItem("nocRecords",JSON.stringify(records));
}

function addRecord(){

const record = {
date:document.getElementById("date").value,
site:document.getElementById("site").value,
type:document.getElementById("type").value,
cause:document.getElementById("cause").value,
duration:document.getElementById("duration").value
};

records.push(record);

saveData();
renderTable();
updateCharts();

}

function renderTable(){

const tbody =
document.querySelector("#recordsTable tbody");

tbody.innerHTML="";

records.forEach(r=>{

tbody.innerHTML += `
<tr>
<td>${r.date}</td>
<td>${r.site}</td>
<td>${r.type}</td>
<td>${r.cause}</td>
<td>${r.duration}</td>
</tr>
`;

});

}

let pieChart;
let barChart;

function updateCharts(){

const causeCounts = {};

records.forEach(r=>{
causeCounts[r.cause] =
(causeCounts[r.cause] || 0)+1;
});

const pieLabels =
Object.keys(causeCounts);

const pieValues =
Object.values(causeCounts);

if(pieChart) pieChart.destroy();

pieChart = new Chart(
document.getElementById("pieChart"),
{
type:"pie",
data:{
labels:pieLabels,
datasets:[{
data:pieValues
}]
}
}
);

const weekCounts = {};

records.forEach(r=>{

const week =
r.date
? new Date(r.date)
.getWeek()
: 0;

weekCounts[week] =
(weekCounts[week] || 0)+1;

});

if(barChart) barChart.destroy();

barChart = new Chart(
document.getElementById("barChart"),
{
type:"bar",
data:{
labels:Object.keys(weekCounts),
datasets:[{
label:"Outages",
data:Object.values(weekCounts),
backgroundColor:"red"
}]
}
}
);

}

Date.prototype.getWeek = function() {
const d = new Date(
Date.UTC(
this.getFullYear(),
this.getMonth(),
this.getDate()
));
const dayNum = d.getUTCDay() || 7;
d.setUTCDate(
d.getUTCDate() + 4 - dayNum
);
const yearStart =
new Date(
Date.UTC(d.getUTCFullYear(),0,1)
);
return Math.ceil(
(((d - yearStart)/86400000)+1)/7
);
};

function exportCSV(){

let csv =
"Date,Site,Type,Cause,Duration\n";

records.forEach(r=>{

csv +=
`${r.date},${r.site},${r.type},${r.cause},${r.duration}\n`;

});

const blob =
new Blob([csv],
{type:'text/csv'});

const a =
document.createElement('a');

a.href =
URL.createObjectURL(blob);

a.download =
"Vodafone_PNG_NOC_Report.csv";

a.click();

}

renderTable();
updateCharts();

</script>

</body>
</html>
