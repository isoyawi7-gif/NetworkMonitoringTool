<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vodafone PNG NetworkTool</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
width:400px;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
text-align:center;
}

.logo{
width:120px;
margin-bottom:15px;
}

h2{
color:#e60000;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#e60000;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#b30000;
}

.footer{
margin-top:20px;
font-size:12px;
color:#666;
}
</style>
</head>

<body>

<div class="login-box">

<img src="VFlogo.png" class="logo">

<h2>Vodafone PNG Iso Yawi System Portal</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="footer">
2026 © Iso Yawi System Creator
</div>

</div>


<script>
function login(){

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "admin" && pass === "admin123"){

        sessionStorage.setItem("loggedIn","true");

        window.location.href = "netopsdashboard.html";

    }else{

        alert("Invalid Username or Password");

    }

}
sessionStorage.setItem("loggedIn","true");
history.pushState(null,null,"netopsdashboard.html");
window.location.href="netopsdashboard.html";
</script>

</body>
</html>
